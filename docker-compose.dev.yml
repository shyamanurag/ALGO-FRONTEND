# Elite Autonomous Trading Platform - Development Environment
version: '3.8'

services:
  # PostgreSQL Database (for development)
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: elite_trading_dev
      POSTGRES_USER: trading_user
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading_user -d elite_trading_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (Development with hot reload)
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://trading_user:dev_password@postgres:5432/elite_trading_dev
      - REDIS_URL=redis://redis:6379
      - PAPER_TRADING=true
      - AUTONOMOUS_TRADING_ENABLED=true
      - JWT_SECRET_KEY=dev-secret-key-change-in-production
      - PYTHONPATH=/app/backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend:cached
      - ./logs:/app/logs
    command: python -m uvicorn server:app --host 0.0.0.0 --port 8001 --reload
    working_dir: /app/backend

  # Frontend Development Server
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_BACKEND_URL=http://localhost:8001
      - CHOKIDAR_USEPOLLING=true
      - FAST_REFRESH=false
    volumes:
      - ./frontend:/app:cached
      - /app/node_modules
    command: yarn start
    depends_on:
      - backend
    stdin_open: true
    tty: true

volumes:
  postgres_dev_data:
  redis_dev_data: