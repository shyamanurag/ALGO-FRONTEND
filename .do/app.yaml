name: elite-trading-platform
region: nyc
services:
- name: elite-trading-platform
  source_dir: /
  github:
    repo: YOUR_GITHUB_USERNAME/elite-trading-platform
    branch: main
    deploy_on_push: true
  run_command: /usr/bin/supervisord -c /etc/supervisor/conf.d/supervisord.conf
  environment_slug: docker
  instance_count: 1
  instance_size_slug: basic-xxs
  http_port: 80
  
  health_check:
    http_path: /health
    initial_delay_seconds: 60
    period_seconds: 30
    timeout_seconds: 10
    success_threshold: 1
    failure_threshold: 3

  # Environment variables for production
  envs:
  - key: NODE_ENV
    value: "production"
  - key: PYTHON_ENV
    value: "production"
  - key: PAPER_TRADING
    value: "false"
  - key: AUTONOMOUS_TRADING_ENABLED
    value: "true"
  - key: INTRADAY_TRADING_ENABLED
    value: "true"
  - key: ELITE_RECOMMENDATIONS_ENABLED
    value: "true"
  - key: DATA_PROVIDER_ENABLED
    value: "true"
  - key: AUTO_SQUARE_OFF_ENABLED
    value: "true"
  - key: AUTO_TARGET_BOOKING
    value: "true"
  - key: AUTO_STOP_LOSS
    value: "true"
  - key: DAILY_STOP_LOSS_PERCENT
    value: "2.0"
  - key: JWT_ALGORITHM
    value: "HS256"
  - key: JWT_EXPIRATION_HOURS
    value: "24"
    
  # Database and Redis connections (will be set in DigitalOcean dashboard)
  # These will be configured to use your dedicated PostgreSQL and Redis databases
  - key: DATABASE_URL
    scope: RUN_AND_BUILD_TIME
    type: SECRET
  - key: REDIS_URL
    scope: RUN_AND_BUILD_TIME
    type: SECRET
  - key: JWT_SECRET_KEY
    scope: RUN_AND_BUILD_TIME
    type: SECRET
    
  # Trading API credentials (set in DigitalOcean dashboard)
  - key: TRUEDATA_USERNAME
    scope: RUN_AND_BUILD_TIME
    type: SECRET
  - key: TRUEDATA_PASSWORD
    scope: RUN_AND_BUILD_TIME
    type: SECRET
  - key: ZERODHA_API_KEY
    scope: RUN_AND_BUILD_TIME
    type: SECRET
  - key: ZERODHA_API_SECRET
    scope: RUN_AND_BUILD_TIME
    type: SECRET
  - key: ZERODHA_CLIENT_ID
    scope: RUN_AND_BUILD_TIME
    type: SECRET

# Static site for documentation (optional)
static_sites:
- name: docs
  source_dir: docs
  github:
    repo: YOUR_GITHUB_USERNAME/elite-trading-platform
    branch: main
    deploy_on_push: true
  build_command: echo "No build needed for docs"
  
